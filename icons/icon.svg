<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#07070f"/>

  <!-- Outer glow rings -->
  <circle cx="256" cy="290" r="180" fill="none" stroke="#8b7cf8" stroke-width="4" opacity="0.12"/>
  <circle cx="256" cy="290" r="145" fill="none" stroke="#8b7cf8" stroke-width="4" opacity="0.22"/>
  <circle cx="256" cy="290" r="112" fill="none" stroke="#8b7cf8" stroke-width="4" opacity="0.36"/>

  <!-- Head -->
  <circle cx="256" cy="155" r="42" fill="#8b7cf8"/>

  <!-- Shoulders / upper body -->
  <ellipse cx="256" cy="268" rx="72" ry="52" fill="#8b7cf8"/>

  <!-- Left arm resting -->
  <ellipse cx="168" cy="296" rx="58" ry="20" fill="#7060e0"
           transform="rotate(-12 168 296)"/>
  <!-- Right arm resting -->
  <ellipse cx="344" cy="296" rx="58" ry="20" fill="#7060e0"
           transform="rotate(12 344 296)"/>

  <!-- Folded legs base -->
  <ellipse cx="256" cy="340" rx="108" ry="32" fill="#6347d4" opacity="0.9"/>

  <!-- Hands in lap (mudra circle) -->
  <circle cx="256" cy="308" r="22" fill="none" stroke="#b0a0ff" stroke-width="5" opacity="0.7"/>
</svg>
