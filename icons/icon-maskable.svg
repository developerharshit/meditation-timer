<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background (no rounded corners — maskable safe zone is center 80%) -->
  <rect width="512" height="512" fill="#07070f"/>

  <!-- Outer glow rings -->
  <circle cx="256" cy="290" r="170" fill="none" stroke="#8b7cf8" stroke-width="4" opacity="0.12"/>
  <circle cx="256" cy="290" r="135" fill="none" stroke="#8b7cf8" stroke-width="4" opacity="0.22"/>
  <circle cx="256" cy="290" r="102" fill="none" stroke="#8b7cf8" stroke-width="4" opacity="0.36"/>

  <!-- Head -->
  <circle cx="256" cy="160" r="38" fill="#8b7cf8"/>

  <!-- Shoulders / upper body -->
  <ellipse cx="256" cy="268" rx="66" ry="48" fill="#8b7cf8"/>

  <!-- Left arm -->
  <ellipse cx="174" cy="294" rx="52" ry="18" fill="#7060e0" transform="rotate(-12 174 294)"/>
  <!-- Right arm -->
  <ellipse cx="338" cy="294" rx="52" ry="18" fill="#7060e0" transform="rotate(12 338 294)"/>

  <!-- Legs base -->
  <ellipse cx="256" cy="336" rx="98" ry="29" fill="#6347d4" opacity="0.9"/>

  <!-- Mudra circle -->
  <circle cx="256" cy="306" r="20" fill="none" stroke="#b0a0ff" stroke-width="4.5" opacity="0.7"/>
</svg>
